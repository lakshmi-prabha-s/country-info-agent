<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="553px" preserveAspectRatio="none" style="width:746px;height:553px;background:#FFFFFF;" version="1.1" viewBox="0 0 746 553" width="746px" zoomAndPan="magnify"><title>Country Q&amp;A Agent - LangGraph Architecture</title><defs/><g><g class="title" data-source-line="9"><text fill="#000000" font-family="Helvetica" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="564.4912" x="89.3424" y="35.4209">Country Q&amp;A Agent - LangGraph Architecture</text></g><ellipse cx="327.2708" cy="61.6094" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#F4F6F8" height="47.9375" rx="12.5" ry="12.5" style="stroke:#2C3E50;stroke-width:1;" width="193.1855" x="230.678" y="91.6094"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="67.6348" x="240.678" y="112.748">User Query</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="173.1855" x="240.678" y="126.7168">(e.g., "Population of Brazil?")</text><rect fill="#FFFFFF" height="301.4922" style="stroke:#000000;stroke-width:1;" width="734.176" x="6" y="149.5469"/><path d="M181.9834,149.5469 L181.9834,158.8438 L171.9834,168.8438 L6,168.8438" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="165.9834" x="9" y="163.542">LangGraph State Graph</text><path d="M432.8889,178.8438 L432.8889,202.543 L412.8889,206.543 L432.8889,210.543 L432.8889,234.2422 A0,0 0 0 0 432.8889,234.2422 L709.8645,234.2422 A0,0 0 0 0 709.8645,234.2422 L709.8645,188.8438 L699.8645,178.8438 L432.8889,178.8438 A0,0 0 0 0 432.8889,178.8438" fill="#E8F4F8" style="stroke:#3498DB;stroke-width:1;"/><path d="M699.8645,178.8438 L699.8645,188.8438 L709.8645,188.8438 L699.8645,178.8438" fill="#E8F4F8" style="stroke:#3498DB;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="168.8032" x="438.8889" y="195.9106">LLM Structured Output</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="255.9756" x="438.8889" y="211.0435">- Extracts 'country' &amp; 'requested_fields'</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="206.8511" x="438.8889" y="226.1763">- Validates if query is in-domain</text><rect fill="#F4F6F8" height="33.9688" rx="12.5" ry="12.5" style="stroke:#2C3E50;stroke-width:1;" width="171.2363" x="241.6526" y="189.5586"/><text fill="#000000" font-family="Helvetica" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="95.291" x="251.6526" y="210.6973">extract_intent</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="52.1309" x="350.7581" y="210.6973">(Node 1)</text><polygon fill="#F4F6F8" points="287.3179,254.2422,367.2236,254.2422,379.2236,266.2422,367.2236,278.2422,287.3179,278.2422,275.3179,266.2422,287.3179,254.2422" style="stroke:#2C3E50;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="79.9058" x="287.3179" y="270.0503">Is query valid?</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="19.2178" x="256.1001" y="263.6479">Yes</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="105.8804" x="379.2236" y="263.6479">No / Out of Domain</text><path d="M185.2188,288.2422 L185.2188,311.9414 L165.2188,315.9414 L185.2188,319.9414 L185.2188,343.6406 A0,0 0 0 0 185.2188,343.6406 L448.0708,343.6406 A0,0 0 0 0 448.0708,343.6406 L448.0708,298.2422 L438.0708,288.2422 L185.2188,288.2422 A0,0 0 0 0 185.2188,288.2422" fill="#E8F4F8" style="stroke:#3498DB;stroke-width:1;"/><path d